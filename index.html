<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RankLens ｜ 評価ページ構造アナライザー</title>
  <meta name="description" content="RankLens - Googleがどのページ(URL構造)を評価しているかを見抜く、評価ページ構造アナライザー" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RankLens</h1>
    <p class="sub">評価ページ構造アナライザー｜運用するほど賢くなる</p>
    <p id="loopBadge" class="loop-badge">🔄 学習した知見：読み込み中…</p>
  </header>

  <main>
    <section class="card">
      <label>あなたのドメイン <span class="req">*必須</span>
        <input id="domain" type="text" placeholder="例：example.com / http://example.com/ どちらでもOK" />
        <small class="hint">http:// の有無、末尾の / の有無、どれでも動きます。</small>
      </label>
      <label>調べたいキーワード（改行区切りで複数可） <span class="req">*必須</span>
        <textarea id="keywords" rows="4" placeholder="SEO&#10;コンテンツ マーケティング"></textarea>
      </label>
      <button id="runBtn">評価ページ構造を分析する</button>
      <p id="status" class="status"></p>
    </section>

    <section id="results"></section>
  </main>

  <footer>
    <small>© RankLens - 完全無料構成</small>
  </footer>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
